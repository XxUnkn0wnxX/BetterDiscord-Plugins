name: Build Plugins

on:
    workflow_dispatch:
    push:
        branches:
            - master
        paths:
            - .github/workflows/build-plugins.yml
            - package.json
            - package-lock.json
            - rollup.config.ts
            - tsconfig.json
            - global.d.ts
            - scripts/build.ts
            - packages/**
            - src/**

permissions:
    contents: write

concurrency:
    group: build-plugins-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        if: github.ref == 'refs/heads/master'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install dependencies
              run: npm ci

            - name: Type check
              run: npm run check

            - name: Lint
              run: npm run lint

            - name: Determine build targets
              id: targets
              env:
                  EVENT_NAME: ${{ github.event_name }}
                  EVENT_BEFORE: ${{ github.event.before }}
                  EVENT_SHA: ${{ github.sha }}
              run: |
                  declare -A published_map=()
                  declare -A selected=()

                  mapfile -t published < <(
                    node -e '
                    const fs = require("fs");
                    const path = require("path");

                    const srcDir = path.join(process.cwd(), "src");
                    const entries = fs.readdirSync(srcDir, { withFileTypes: true })
                      .filter((entry) => entry.isDirectory())
                      .map((entry) => entry.name)
                      .sort();

                    for (const name of entries) {
                      const pkgPath = path.join(srcDir, name, "package.json");
                      const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
                      if (pkg.betterdiscord?.publish !== false) {
                        console.log(name);
                      }
                    }
                    '
                  )

                  for plugin in "${published[@]}"; do
                    published_map["$plugin"]=1
                  done

                  rebuild_all=false

                  if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
                    rebuild_all=true
                  elif [ -z "$EVENT_BEFORE" ] || [ "$EVENT_BEFORE" = "0000000000000000000000000000000000000000" ]; then
                    rebuild_all=true
                  else
                    while IFS= read -r file; do
                      [ -n "$file" ] || continue

                      case "$file" in
                        src/*)
                          plugin="${file#src/}"
                          plugin="${plugin%%/*}"
                          if [ -n "${published_map[$plugin]}" ]; then
                            selected["$plugin"]=1
                          fi
                          ;;
                        packages/*|scripts/build.ts|package.json|package-lock.json|rollup.config.ts|tsconfig.json|global.d.ts)
                          rebuild_all=true
                          ;;
                      esac
                    done < <(git diff --name-only "$EVENT_BEFORE" "$EVENT_SHA")
                  fi

                  targets=()
                  if [ "$rebuild_all" = true ]; then
                    targets=("${published[@]}")
                  else
                    for plugin in "${published[@]}"; do
                      if [ -n "${selected[$plugin]}" ]; then
                        targets+=("$plugin")
                      fi
                    done
                  fi

                  if [ "${#targets[@]}" -eq 0 ]; then
                    echo "should_build=false" >> "$GITHUB_OUTPUT"
                    echo "No published plugin targets changed."
                    exit 0
                  fi

                  echo "should_build=true" >> "$GITHUB_OUTPUT"
                  {
                    echo "targets<<EOF"
                    printf '%s ' "${targets[@]}"
                    echo
                    echo "EOF"
                  } >> "$GITHUB_OUTPUT"
                  printf 'Building targets: %s\n' "${targets[*]}"

            - name: Prepare dist directory
              if: steps.targets.outputs.should_build == 'true'
              run: |
                  mkdir -p dist/bd

            - name: Build plugins
              if: steps.targets.outputs.should_build == 'true'
              run: npm run build -- ${{ steps.targets.outputs.targets }}

            - name: Commit updated distributables
              if: steps.targets.outputs.should_build == 'true'
              run: |
                  git add -A dist/bd

                  if git diff --cached --quiet; then
                    echo "No distributable changes to commit."
                    exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git commit -m "Build plugins"
                  git push origin master

            - name: Refresh rolling fork release
              if: steps.targets.outputs.should_build == 'true'
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  TAG="Nightly-Fork"
                  FULL_SHA="$(git rev-parse HEAD)"
                  DIST_URL="https://github.com/$GITHUB_REPOSITORY/tree/master/dist/bd"

                  gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes || true
                  git push origin ":refs/tags/$TAG" || true

                  gh release create "$TAG" dist/bd/*.plugin.js \
                    --repo "$GITHUB_REPOSITORY" \
                    --target "$FULL_SHA" \
                    --title "Nightly-Fork" \
                    --notes "Auto-built from commit $FULL_SHA. Browse the full published plugin set in [dist/bd]($DIST_URL) on master. This rolling release may only reflect the plugins rebuilt by the latest change set." \
                    --latest
